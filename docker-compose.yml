services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-astra}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: /home/dhanushvm/Hackathon/astra-360
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:root@db:3306/astra}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      LLM_URL: ${LLM_URL:-http://host.docker.internal:11434/api/generate}
      LLM_MODEL: ${LLM_MODEL:-mistral}
      OLLAMA_API_TOKEN: ${OLLAMA_API_TOKEN:-}
      GPU_EMBED_URL: ${GPU_EMBED_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      MY_REAL_PHONE: ${MY_REAL_PHONE:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      USE_MULTI_AGENT: ${USE_MULTI_AGENT:-true}
      USE_AGENTIC_CHAT: ${USE_AGENTIC_CHAT:-true}
      AGENTIC_DEBUG: ${AGENTIC_DEBUG:-false}
      CATEGORY_TIMEOUT_SECONDS: ${CATEGORY_TIMEOUT_SECONDS:-15}
      CATEGORY_CONCURRENCY: ${CATEGORY_CONCURRENCY:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - target: 8000
        published: ${BACKEND_PORT:-0}
        protocol: tcp
    volumes:
      - backend_uploads:/app/backend/temp_uploads

  ui:
    build:
      context: /home/dhanushvm/Hackathon/astra-360
      dockerfile: docker/ui.Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - target: 80
        published: ${UI_PORT:-0}
        protocol: tcp

volumes:
  mysql_data:
  qdrant_data:
  backend_uploads:
