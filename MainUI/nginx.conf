# Serves the Vite-built SPA and proxies API paths to the `backend` Compose service.
# Resolver + variable proxy_pass: Docker DNS (127.0.0.11) resolves `backend` at request time
# so `nginx -t` works without that hostname, and the stack works in docker-compose.

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Matches the backend service name on the Compose network.
    set $backend_host "backend";

    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml;

    add_header X-Content-Type-Options nosniff always;

    # Versioned static assets from Vite (hashed filenames — safe to cache).
    location ~* ^/assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location /chat {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location /rag {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location /data {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location /insurance {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location /dev {
        include /etc/nginx/snippets/astra-proxy-headers.conf;
        proxy_pass http://$backend_host:8000$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
